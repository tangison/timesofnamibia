# Times of Namibia — CI Pipeline (TANGISON)
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend-new } }
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      INTERNAL_API_SECRET: "ci-test-secret-min-16-chars-long"
      ADMIN_TOKEN: "ci-test-admin-token-min-16-chars"
      BACKEND_URL: "http://localhost:8000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-new/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
        continue-on-error: true
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    env:
      DATABASE_URL: "sqlite:///./test.db"
      INTERNAL_API_SECRET: "ci-test-secret-min-16-chars-long"
      GROQ_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx
      - run: ruff check app/
      - run: pytest -v
        continue-on-error: true
