# Times of Namibia — docker-compose (TANGISON full stack)
services:
  frontend:
    build:
      context: .
      dockerfile: frontend-new/Dockerfile
    container_name: ton-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://namibia:${POSTGRES_PASSWORD:?required}@postgres:5432/namibiatimes?schema=frontend"
      BACKEND_URL: "http://backend:8000"
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?required}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?required}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://timesofnamibia.com}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ton-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: "postgresql+psycopg://namibia:${POSTGRES_PASSWORD:?required}@postgres:5432/namibiatimes"
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?required}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: ton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: namibia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: namibiatimes
    volumes:
      - ton-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namibia -d namibiatimes"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: ton-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ton-caddy-data:/data
      - ton-caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  ton-postgres-data:
  ton-caddy-data:
  ton-caddy-config:
